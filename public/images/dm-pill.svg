<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <!-- Radial gradients for each color channel to create convex lens displacement -->
    <radialGradient id="rg" cx="50%" cy="50%" rx="48%" ry="46%">
      <stop offset="0%" stop-color="rgb(190,210,180)" />
      <stop offset="30%" stop-color="rgb(160,190,170)" />
      <stop offset="60%" stop-color="rgb(140,160,155)" />
      <stop offset="85%" stop-color="rgb(128,128,128)" />
      <stop offset="100%" stop-color="rgb(110,115,120)" />
    </radialGradient>
    <!-- Edge highlight gradients for realistic lens refraction -->
    <linearGradient id="topHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(170,230,190)" stop-opacity="0.7" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <linearGradient id="botHL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="100%" stop-color="rgb(180,110,160)" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="leftHL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgb(200,140,170)" stop-opacity="0.5" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    <linearGradient id="rightHL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="100%" stop-color="rgb(100,180,170)" stop-opacity="0.5" />
    </linearGradient>
  </defs>
  <!-- Neutral gray base -->
  <rect width="320" height="80" fill="rgb(128,128,128)" />
  <!-- Main convex body with pill shape -->
  <rect x="8" y="6" width="304" height="68" rx="34" fill="url(#rg)" filter="url(#blur)" />
  <!-- Directional edge highlights for chromatic refraction effect -->
  <rect x="8" y="6" width="304" height="34" rx="20" fill="url(#topHL)" filter="url(#blur)" />
  <rect x="8" y="40" width="304" height="34" rx="20" fill="url(#botHL)" filter="url(#blur)" />
  <rect x="8" y="6" width="80" height="68" rx="34" fill="url(#leftHL)" filter="url(#blur)" />
  <rect x="232" y="6" width="80" height="68" rx="34" fill="url(#rightHL)" filter="url(#blur)" />
</svg>
